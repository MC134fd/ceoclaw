<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Dogblogger People App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
    :root{
      --color-primary: #16a34a;
      --color-secondary: #15803d;
      --color-bg: #f0fdf4;
      --color-surface: #ffffff;
      --color-text: #14532d;
      --color-muted: #6b7280;
      --accent-gradient: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      --space-xs: clamp(0.25rem, 0.5vw, 0.5rem);
      --space-sm: clamp(0.5rem, 1vw, 0.75rem);
      --space-md: clamp(0.75rem, 1.5vw, 1.25rem);
      --space-lg: clamp(1rem, 2vw, 1.75rem);
      --space-xl: clamp(1.5rem, 3vw, 2.5rem);
      --space-2xl: clamp(2rem, 5vw, 4rem);
      --text-sm: clamp(0.8rem, 1.6vw, 0.95rem);
      --text-md: clamp(1rem, 2vw, 1.05rem);
      --text-2xl: clamp(1.5rem, 3vw, 2rem);
      --container-width: clamp(320px, 90vw, 900px);
      --radius: 12px;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;padding:0}
    .container{max-width:var(--container-width);margin-inline:auto;padding-inline:var(--space-md);padding-block:var(--space-xl)}
    header{padding-block:var(--space-sm)}
    .brand{font-family:'Cormorant Garamond',serif;font-size:var(--text-2xl);font-weight:600}
    .card{background:var(--color-surface);padding:var(--space-lg);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,0.06);border:1px solid rgba(20,83,45,0.04)}
    label{display:block;font-weight:600;margin-bottom:var(--space-xs)}
    input[type=email],input[type=password]{width:100%;padding:calc(var(--space-sm));border-radius:8px;border:1px solid rgba(20,83,45,0.08);font-size:var(--text-md);}
    .form-actions{display:flex;gap:var(--space-sm);margin-top:var(--space-md)}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:var(--space-sm) var(--space-md);border-radius:10px;border:0;cursor:pointer}
    .btn-primary{background:var(--accent-gradient);color:var(--color-surface);font-weight:600}
    .btn-secondary{background:transparent;border:1.5px solid var(--color-primary);color:var(--color-primary);font-weight:600}
    .note{color:var(--color-muted);font-size:var(--text-sm);margin-top:var(--space-sm)}
    @media (max-width:640px){.container{padding-inline:var(--space-sm)}}
  </style>
</head>
<body>
  <header class="container">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="brand">Dogblogger People App</div>
      <nav style="display:flex;gap:var(--space-sm);align-items:center">
        <a href="../index.html">Home</a>
        <a href="../index.html#features">Features</a>
        <a href="pricing.html">Pricing</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2 style="font-family:'Cormorant Garamond',serif;margin-top:0;margin-bottom:var(--space-md)">Create your account</h2>
      <p style="margin-top:0;color:var(--color-muted);margin-bottom:var(--space-md)">Start listing dogs, managing leads in your user dashboard, and export listing data when needed.</p>

      <form id="signupForm" action="../app.html" method="GET" novalidate>
        <div style="margin-bottom:var(--space-md)">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" aria-label="Email address" required placeholder="you@example.com">
        </div>
        <div style="margin-bottom:var(--space-md)">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" aria-label="Choose a password" required minlength="8" placeholder="Minimum 8 characters">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Get Started</button>
          <a href="../index.html" class="btn btn-secondary">Back</a>
        </div>
        <div class="note">By signing up you confirm you use the app to responsibly list and sell dogs. You can export listing data anytime via the dashboard.</div>
      </form>
    </section>
  </main>

  <script>
    (function(){
      const form = document.getElementById('signupForm');
      form.addEventListener('submit', (e)=>{
        const email = form.email.value || '';
        const pass = form.password.value || '';
        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if(!emailOk || pass.length < 8){
          e.preventDefault();
          alert('Please provide a valid email and a password of at least 8 characters.');
        }
      });
    })();
  </script>
</body>
</html>
