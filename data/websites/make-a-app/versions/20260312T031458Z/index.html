<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The smarter core functionality platform built for general users.">
  <title>Make A App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
    :root {
      --color-primary: #6366f1;
      --color-secondary: #a78bfa;
      --color-bg: #0f172a;
      --color-surface: #1e293b;
      --color-text: #f8fafc;
      --color-muted: #64748b;
      --font-display: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-lg: 24px;
      --shadow-md: 0 4px 24px rgba(0,0,0,.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--color-text);
      background: var(--color-bg);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 0;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .navbar-inner { display: flex; align-items: center; justify-content: space-between; }
    .brand { font-family: var(--font-display); font-weight: 700; font-size: 1.2rem; color: var(--color-text); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--color-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--color-text); }
    .nav-cta {
      padding: 0.5rem 1.25rem;
      background: var(--color-primary);
      color: #fff;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* Hero */
    .hero {
      padding: 7rem 0 5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      position: relative;
    }
    .hero-sub {
      font-size: 1.2rem;
      color: var(--color-muted);
      max-width: 560px;
      margin: 0 auto 1rem;
    }
    .audience-note {
      font-size: 0.875rem;
      color: var(--color-secondary);
      margin-bottom: 2.5rem;
    }
    .hero-ctas { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2.5rem; }
    .btn-primary {
      display: inline-block;
      padding: 0.875rem 2.25rem;
      background: var(--color-primary);
      color: #fff;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-md);
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-block;
      padding: 0.875rem 2.25rem;
      background: transparent;
      color: var(--color-text);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover { border-color: var(--color-primary); color: var(--color-primary); }

    /* Features */
    .features { padding: 6rem 0; }
    .section-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-primary); margin-bottom: 1rem; }
    .section-title { font-family: var(--font-display); font-size: clamp(1.75rem, 3vw, 2.5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 3rem; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .feature-card {
      background: var(--color-surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      padding: 2rem;
      transition: border-color 0.2s;
    }
    .feature-card:hover { border-color: rgba(99,102,241,0.4); }
    .feature-num { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: var(--color-primary); opacity: 0.3; margin-bottom: 0.75rem; line-height: 1; }
