<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make A App — App</title>
  <style>
    /* Google Fonts: display + body fonts (import inside style block) */
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap');

    :root{
      /* Colors (design system: rose) */
      --color-primary: #f43f5e;
      --color-secondary: #fb7185;
      --color-bg: #0f0508;
      --color-surface: #1a0b11;
      --color-text: #fff1f2;
      --color-muted: #9f8090;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-lg: 24px;

      /* Shadows */
      --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
      --shadow-md: 0 4px 24px rgba(0,0,0,.5);
      --shadow-lg: 0 16px 64px rgba(0,0,0,.6);

      /* Spacing system (mobile-first). Use scale ratio 1.25 when needed */
      --space-xxs: 0.25rem;
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 1.5rem;
      --space-lg: 2.5rem;
      --section-space: 3.5rem; /* base section padding (mobile) */

      /* Layout tokens */
      --nav-width: 220px; /* desktop nav width */
      --container-max: 1200px;

      /* Motion */
      --ease: all 0.18s ease;

      /* Typography */
      --font-display: 'Fraunces', serif;
      --font-body: 'Source Sans 3', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }

    /* Reset + base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(180deg, var(--color-bg) 0%, #0b0410 100%);
      color: var(--color-text);
      display: flex;
      flex-direction: column; /* mobile-first: nav above content */
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.45;
    }

    /* Sticky translucent nav that becomes sidebar on larger screens */
    nav {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      width: 100%;
      padding: calc(var(--space-sm)) calc(var(--space-md));
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(26,11,17,0.55);
      backdrop-filter: blur(16px) saturate(120%);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: var(--ease);
    }

    nav .logo { 
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--color-text);
      font-size: 1rem;
      display: inline-block;
    }

    nav ul { list-style: none; display:flex; gap: var(--space-md); align-items:center; margin-left: auto; }
    nav a {
      color: var(--color-text);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 0.6rem;
      border-radius: var(--radius-sm);
      transition: var(--ease);
      font-size: 0.94rem;
      opacity: 0.95;
    }
    nav a:hover { transform: translateY(-2px); color: var(--color-primary); }

    /* Layout containers */
    main { flex: 1; width: 100%; padding: var(--section-space) calc(var(--space-md)); }
    .container { max-width: var(--container-max); margin: 0 auto; }

    /* Dashboard heading */
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 3.5vw, 1.6rem);
      margin-bottom: var(--space-md);
      letter-spacing: -0.02em;
      color: var(--color-text);
    }

    /* Sidebar + content layout for larger screens */
    @media (min-width: 720px) {
      body { flex-direction: row; }
      nav {
        flex-direction: column;
        align-items: flex-start;
        width: var(--nav-width);
        min-height: 100vh;
        padding: calc(var(--space-lg)) calc(var(--space-md));
        border-right: 1px solid rgba(255,255,255,0.03);
        border-bottom: none;
      }
      nav ul { flex-direction: column; margin-left: 0; gap: var(--space-sm); width: 100%; }
      nav a { width: 100%; padding: 0.6rem 0.75rem; }
      main { padding: calc(var(--space-lg)) calc(var(--space-lg)); }
    }

    @media (min-width: 1024px) {
      :root { --section-space: 5rem; }
      nav { width: 260px; }
      h1 { font-size: 1.9rem; }
      main { padding: calc(var(--section-space)) calc(var(--section-space) + 1rem); }
    }

    /* Cards — glass-morphism + elevation */
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(8px) saturate(130%);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: var(--space-md);
      box-shadow: var(--shadow-sm);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }

    .placeholder {
      height: 120px;
      background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-muted);
      font-size: 0.9rem;
      border: 1px dashed rgba(255,255,255,0.03);
    }

    /* Quick actions grid for larger screens */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
    }
    @media (min-width: 720px) {
      .grid-2 { grid-template-columns: 1fr 1fr; }
    }

    /* Fine tuned text sizes and spacing */
    .muted { color: var(--color-muted); font-size: 0.95rem; }

    /* Accessible focus styles */
    a:focus, button:focus { outline: 3px solid rgba(244,63,94,0.18); outline-offset: 2px; }

    /* Small utilities */
    .stack { display:flex; flex-direction:column; gap: var(--space-xs); }
    .row { display:flex; gap: var(--space-sm); align-items:center; }

    /* Make sure long content scrolls inside main on desktop while nav stays visible */
    @media (min-width: 720px) {
      main { overflow-y: auto; }
    }

  </style>
</head>
<body>
  <nav>
    <span class="logo">Make A App</span>
    <ul>
        <li><a href="#feat-0">core functionality</a></li>
        <li><a href="#feat-1">user dashboard</a></li>
        <li><a href="#feat-2">data export</a></li>
      <li><a href="/">← Back to landing</a></li>
    </ul>
  </nav>
  <main>
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;">Make A App Dashboard</h1>
    <div class="card">
      <h2>Overview</h2>
      <div class="placeholder">Your data will appear here once you connect your account.</div>
    </div>
    <div class="card">
      <h2>Quick Actions</h2>
      <div class="placeholder">Actions panel — coming soon.</div>
    </div>
  </main>
</body>
</html>
