<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodDog Coach — Premium Dog Training, Personalised Plans</title>
  <style>
    /* Font import (required by design system) */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      /* Framer Aura palette (follow exactly) */
      --color-primary: #F59E0B;
      --color-secondary: #FBBF24;
      --color-accent-pink: #ec4899;
      --accent-gradient: linear-gradient(135deg, #F59E0B 0%, #FBBF24 50%, #FDE68A 100%);

      --color-bg: #0a0a0f;
      --color-surface: #12121a;
      --color-text: #f0f0ff;
      --color-muted: #6b7280;

      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-lg: 24px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
      --shadow-md: 0 4px 24px rgba(0,0,0,.5);
      --shadow-lg: 0 16px 64px rgba(0,0,0,.6);

      /* Spacing scale (fluid) */
      --space-xs: clamp(0.25rem, 0.5vw, 0.5rem);
      --space-sm: clamp(0.5rem, 1vw, 0.75rem);
      --space-md: clamp(0.75rem, 1.5vw, 1.25rem);
      --space-lg: clamp(1rem, 2vw, 1.75rem);
      --space-xl: clamp(1.5rem, 3vw, 2.5rem);
      --space-2xl: clamp(2rem, 5vw, 4rem);

      /* Type scale */
      --text-sm: clamp(0.8rem, 1vw + 0.2rem, 1rem);
      --text-base: clamp(1rem, 1.25vw + 0.2rem, 1.125rem);
      --text-lg: clamp(1.125rem, 1.5vw + 0.2rem, 1.25rem);
      --text-xl: clamp(1.25rem, 1.75vw + 0.2rem, 1.5rem);
      --text-2xl: clamp(1.5rem, 2vw + 0.25rem, 1.75rem);
      --text-3xl: clamp(1.75rem, 2.25vw + 0.25rem, 2.25rem);
      --text-4xl: clamp(2.25rem, 2.75vw + 0.25rem, 3rem);

      /* Container */
      --container-width: clamp(320px, 90vw, 1200px);

      /* Motion */
      --motion-ease: cubic-bezier(0.4, 0, 0.2, 1);

      --radius: var(--radius-md);
    }

    /* Global resets */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html,body { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.45;
      overflow-x: hidden;
    }

    h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; letter-spacing: -0.025em; }
    h1 { font-size: var(--text-4xl); letter-spacing: -0.03em; }
    h2 { font-size: var(--text-3xl); }
    h3 { font-size: var(--text-2xl); }

    a { color: inherit; text-decoration: none; }

    /* Container */
    .site { max-width: var(--container-width); margin-inline: auto; padding-inline: var(--space-md); }

    /* Nav */
    nav {
      position: sticky; top: 8px; z-index: 60;
      margin: var(--space-md) 0; backdrop-filter: none; transition: all 220ms var(--motion-ease);
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-md);
    }
    nav.scrolled { backdrop-filter: blur(12px); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

    .nav-left { display:flex; gap: var(--space-md); align-items:center; }
    .brand { font-family: 'Cormorant Garamond', serif; color: transparent; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; font-size: var(--text-2xl); }

    .nav-links { display:flex; gap: var(--space-sm); align-items:center; }
    .nav-links a { color: var(--color-text); padding: calc(var(--space-xs)) calc(var(--space-sm)); border-radius: 8px; font-size: var(--text-sm); }
    .nav-links a:hover { background: rgba(255,255,255,0.02); }

    /* Button variants */
    .btn-primary {
      background: var(--accent-gradient);
      color: white; border: none; padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius); display:inline-flex; align-items:center; gap:8px; min-height:44px; min-width:44px;
      cursor:pointer; transition: all 220ms var(--motion-ease); font-weight:600;
    }
    .btn-primary:hover { transform: scale(1.02); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:focus-visible { outline: 3px solid rgba(167,139,250,0.22); outline-offset: 3px; }

    .btn-secondary {
      background: transparent; color: var(--color-primary); border: 1.5px solid var(--color-primary);
      padding: var(--space-sm) var(--space-md); border-radius: var(--radius); transition: all 220ms var(--motion-ease);
    }

    /* Hero */
    .hero { display: grid; grid-template-columns: 1fr 420px; gap: var(--space-lg); align-items:center; padding-block: var(--space-2xl); }
    @media (max-width: 1024px) { .hero { grid-template-columns: 1fr; } }

    .hero-copy { max-width: 720px; }
    .hero h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: var(--space-sm); }
    .hero p { font-size: var(--text-lg); color: var(--color-muted); margin-bottom: var(--space-lg); }

    .hero-cta { display:flex; gap: var(--space-sm); flex-wrap:wrap; }

    .hero-illustration { width:100%; display:block; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
    .hero-side { display:flex; flex-direction:column; gap: var(--space-md); }

    /* Auth card (integration-ready placeholder) */
    .auth-card { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); padding: var(--space-md); border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.04); backdrop-filter: blur(8px); }
    .auth-card label { font-size: var(--text-sm); color: var(--color-muted); display:block; margin-bottom: var(--space-xs); }
    .auth-card input[type="email"], .auth-card input[type="password"] { width:100%; padding: var(--space-sm); border-radius: var(--space-md); border:1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); color:var(--color-text); }
    .auth-card .submit-row { display:flex; gap: var(--space-sm); margin-top: var(--space-sm); }
