<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Website People App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --color-primary: #6366f1;
      --color-secondary: #a78bfa;
      --color-accent-pink: #ec4899;
      --accent-gradient: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 50%, var(--color-accent-pink) 100%);

      --color-bg: #0a0a0f;
      --color-surface: #12121a;
      --color-text: #f0f0ff;
      --color-muted: #6b7280;

      --radius-sm: 4px; --radius-md:12px; --radius-lg:24px;

      --space-xs: clamp(0.25rem, 0.5vw, 0.5rem);
      --space-sm: clamp(0.5rem, 1vw, 0.75rem);
      --space-md: clamp(0.75rem, 1.5vw, 1.25rem);
      --space-lg: clamp(1rem, 2vw, 1.75rem);
      --space-xl: clamp(1.5rem, 3vw, 2.5rem);
      --space-2xl: clamp(2rem, 5vw, 4rem);

      --text-sm: clamp(0.8rem, 1vw + 0.2rem, 1rem);
      --text-base: clamp(1rem, 1.25vw + 0.2rem, 1.125rem);
      --text-lg: clamp(1.125rem, 1.5vw + 0.2rem, 1.25rem);
      --text-2xl: clamp(1.5rem, 2vw + 0.25rem, 1.75rem);

      --container-width: clamp(320px, 90vw, 1200px);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,-apple-system;background:var(--color-bg);color:var(--color-text);min-height:100vh}
    .site{max-width:var(--container-width);margin:0 auto;padding-inline:var(--space-md);padding-block:var(--space-2xl)}

    h1{font-family:'Cormorant Garamond',serif;font-size:var(--text-3xl);letter-spacing:-0.02em;margin-bottom:var(--space-md)}

    .card{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-lg);border:1px solid rgba(255,255,255,0.04);box-shadow:0 6px 24px rgba(0,0,0,0.5);}

    label{display:block;font-size:var(--text-sm);color:var(--color-muted);margin-bottom:var(--space-xs)}
    input[type=email],input[type=password]{width:100%;padding:var(--space-sm);border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--color-text)}

    .btn-primary{background:var(--accent-gradient);color:white;border:none;padding:var(--space-sm) var(--space-md);border-radius:var(--radius-md);cursor:pointer}
    .btn-secondary{background:transparent;color:var(--color-primary);border:1.5px solid var(--color-primary);padding:var(--space-sm) var(--space-md);border-radius:var(--radius-md)}

    .form-footer{margin-top:var(--space-md);color:var(--color-muted);font-size:var(--text-sm)}

    @media (max-width:640px){.site{padding-inline:var(--space-sm)} }
  </style>
</head>
<body>
  <main class="site">
    <a href="../index.html" style="color:var(--color-muted);display:inline-block;margin-bottom:var(--space-sm);">← Back to Home</a>

    <div class="card" style="max-width:640px;margin-inline:auto;">
      <h1>Create your account</h1>
      <p style="color:var(--color-muted);margin-bottom:var(--space-md)">Sign up to use Website People App — manage projects, exports and your dashboard. Built for general users.</p>

      <form id="signup-form" action="../app.html" method="GET" novalidate>
        <div style="margin-bottom:var(--space-md)">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required aria-label="Email" />
          <div class="error" id="email-error" style="color:#ef4444;display:none;font-size:var(--text-sm);margin-top:var(--space-xs)">Please enter a valid email.</div>
        </div>

        <div style="margin-bottom:var(--space-md)">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="8" required aria-label="Password" />
          <div class="error" id="password-error" style="color:#ef4444;display:none;font-size:var(--text-sm);margin-top:var(--space-xs)">Password must be at least 8 characters.</div>
        </div>

        <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap">
          <button type="submit" class="btn-primary">Start Tracking</button>
          <a class="btn-secondary" href="../index.html">Return</a>
        </div>

        <div class="form-footer">By signing up you agree to our <a href="../index.html" style="color:var(--color-primary)">terms</a>.</div>
      </form>
    </div>
  </main>

  <script>
    // Basic client-side validation
    const form = document.getElementById('signup-form');
    form.addEventListener('submit', (e)=>{
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      let ok = true;
      const emailError = document.getElementById('email-error');
      const passwordError = document.getElementById('password-error');
      emailError.style.display='none'; passwordError.style.display='none';
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRe.test(email.value.trim())){ emailError.style.display='block'; ok=false; }
      if(password.value.trim().length < 8){ passwordError.style.display='block'; ok=false; }
      if(!ok) e.preventDefault();
      // on success the form will navigate to ../app.html (method=GET for demo)
    });
  </script>
</body>
</html>
