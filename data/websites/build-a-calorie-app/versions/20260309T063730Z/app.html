<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build A Calorie App — App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      min-height: 100vh;
      background: #f3f4f6;
      color: #111827;
    }
    nav {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
    }
    nav .logo { font-weight: 800; font-size: 1rem; margin-bottom: 2rem; display: block; }
    nav ul { list-style: none; }
    nav ul li a {
      display: block;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      text-decoration: none;
      color: #374151;
      font-size: 0.9rem;
    }
    nav ul li a:hover { background: #f9fafb; }
    main {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }
    .placeholder {
      height: 120px;
      background: #f9fafb;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 0.875rem;
    }
    @media (max-width: 640px) {
      body { flex-direction: column; }
      nav { width: 100%; border-right: none; border-bottom: 1px solid #e5e7eb; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">Build A Calorie App</span>
    <ul>
        <li><a href="#feat-0">tracking</a></li>
        <li><a href="#feat-1">calorie/macro tracking</a></li>
      <li><a href="/">← Back to landing</a></li>
    </ul>
  </nav>
  <main>
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;">Build A Calorie App Dashboard</h1>
    <div class="card">
      <h2>Overview</h2>
      <div class="placeholder">Your data will appear here once you connect your account.</div>
    </div>
    <div class="card">
      <h2>Quick Actions</h2>
      <div class="placeholder">Actions panel — coming soon.</div>
    </div>
  </main>
</body>
</html>
